            content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1"

        />

        <!-- Structured Data -->
        <script type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "WebApplication",
                "name": "MindSprint - Memory Card Matching Game",
                "url": "https://ahmed-maher77.github.io/MindSprint___Interactive-Memory-Matching-Game/",
                "description": "A browser-based memory card matching game featuring countdown start, timed rounds, progress tracking, pause/resume controls, and audio feedback.",
                "applicationCategory": "GameApplication",
                "operatingSystem": "Any",
                "browserRequirements": "Requires JavaScript and modern browser support for ES modules",
                "inLanguage": "en",
                "keywords": "memory game, matching cards, TypeScript, browser game, responsive UI",
                "author": {
                    "@type": "Person",
                    "name": "Ahmed Maher"
                },
                "offers": {
                    "@type": "Offer",
                    "price": "0",
                    "priceCurrency": "USD"
                },
                "featureList": [
                    "Username prompt before game start",
                    "Countdown start overlay",
                    "Card matching with progress tracking",
                    "Pause and resume gameplay",
                    "Mute and unmute game sounds",
                    "Win and lose end-game summary"
                ]
            }
        </script>

        <!-- Preconnect to CDN -->
        <link
            rel="preconnect"
            href="https://cdnjs.cloudflare.com"
            crossorigin
        />
        <!-- Bootstrap -->
        <link
            rel="stylesheet"
            href="./packages/bootstrap-5.3.8-dist/css/bootstrap.min.css"
        />
        <!-- CSS -->
        <link rel="stylesheet" href="./styles/css/style.css" />
        <!-- Font Awesome -->
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        />
        <!-- Favicon -->
        <link rel="icon" type="image/svg+xml" href="./images/favicon.svg" />
        <link rel="apple-touch-icon" href="./images/favicon.svg" />
    </head>
    <body>
        <!-- Start Screen -->
        <div
            id="start-screen"
            class="position-fixed top-0 start-0 w-100 overlay h-100svh d-flex flex-column justify-content-center align-items-center z-3"
        >
            <!-- Waiting Face -->
            <div class="waiting-face mb-4" aria-hidden="true">
                <span class="face-eye face-eye-left"></span>
                <span class="face-eye face-eye-right"></span>
                <span class="face-mouth"></span>
            </div>
            <!-- Start Button -->
            <button
                id="action-btn"
                class="btn action-btn animated-start-btn rounded-0 px-4 py-07rem fs-5 text-white d-flex gap-2 align-items-center"
            >
                Start Game
                <i class="fa-solid fa-play"></i>
            </button>
        </div>

        <!-- Program Screen -->
        <div id="program-screen" class="container">
            <!-- Top Bar -->
            <nav
                class="mt-3 mb-4 d-flex justify-content-between align-items-center flex-column"
            >
                <!-- Board Info -->
                <div
                    class="board-info d-flex justify-content-between align-items-center gap-3 w-100 flex-wrap"
                >
                    <!-- Welcome Message -->
                    <p id="welcome-message" class="mb-0">
                        👋 <span class="welcome-label">Hello:</span>
                    </p>
                    <!-- Game Timer -->
                    <p
                        id="game-timer"
                        class="mb-0 d-flex gap-1 align-items-center"
                    >
                        <i class="fa-regular fa-clock timer-icon"></i>
                        <span>
                            <span class="timer-label">Time:</span>
                            <span id="timer-value"> 05:00 </span>
                        </span>
                    </p>
                    <!-- Wrong Tries -->
                    <p
                        id="wrong-tries"
                        class="mb-0 d-flex gap-1 align-items-center"
                    >
                        <i
                            class="fa-solid fa-person-falling-burst cancel-color"
                        ></i>
                        <span>
                            <span class="wrong-tries-text cancel-color">
                                Wrong Tries:
                            </span>
                            <span class="wrong-tries-value"> 0 </span>
                        </span>
                    </p>
                </div>
                <!-- Progress -->
                <div
                    id="game-progress"
                    role="progressbar"
                    aria-label="Default striped example"
                    aria-valuenow="0"
                    aria-valuemin="0"
                    aria-valuemax="100"
                >
                    <div
                        class="progress-bar progress-bar-striped"
                        style="width: 0%"
                    ></div>
                    <div class="progress-bar-number">0%</div>
                </div>
            </nav>

            <!-- Cards Container -->
            <main>
                <div id="cards-container" class="mb-5">
                    <div
                        id="cards-container-wrapper"
                        class="row row-cols-2 row-cols-sm-3 row-cols-md-4 row-cols-lg-5 g-3 justify-content-center"
                    >
                        <!-- Cards will be added here via TS -->
                    </div>
                </div>
            </main>
        </div>

        <!-- Mute Button -->
        <button
            id="mute-toggle-btn"
            type="button"
            class="mute-btn mute-btn-floating"
            aria-pressed="false"
            aria-label="Mute sounds"
            title="Mute sounds"
        >
            <i class="fa-solid fa-volume-high"></i>
        </button>

        <!-- Pause Button -->
        <button
            id="pause-toggle-btn"
            type="button"
            class="pause-btn pause-btn-floating d-none"
            aria-pressed="false"
            aria-label="Pause game"
            title="Pause game"
        >
            <i class="fa-solid fa-pause"></i>
        </button>

        <!-- Page Footer -->
        <footer class="site-footer py-4">
            <div
                class="container d-flex flex-column flex-md-row justify-content-between align-items-center gap-3"
            >
                <div class="footer-copy text-center text-md-start">
                    <p class="mb-1 fw-medium">Memory Blocks Game</p>
                    <p class="mb-0">
                        &copy; <span id="current-year"></span>
                        <span class="footer-owner-name">Ahmed Maher</span>. All
                        rights reserved.
                    </p>
                </div>

                <div class="footer-social d-flex align-items-center gap-2">
                    <a
                        class="social-link"
                        href="https://m.facebook.com/ahmed.maher.algohary"
                        target="_blank"
                        rel="noreferrer"
                        aria-label="Facebook"
                        data-tooltip="Facebook"
                    >
                        <i class="fa-brands fa-facebook-f"></i>
                    </a>
                    <a
                        class="social-link"
                        href="https://www.linkedin.com/in/ahmed-maher-algohary"
                        target="_blank"
                        rel="noreferrer"
                        aria-label="LinkedIn"
                        data-tooltip="LinkedIn"
                    >
                        <i class="fa-brands fa-linkedin-in"></i>
                    </a>
                    <a
                        class="social-link"
                        href="https://github.com/Ahmed-Maher77"
                        target="_blank"
                        rel="noreferrer"
                        aria-label="GitHub"
                        data-tooltip="GitHub"
                    >
                        <i class="fa-brands fa-github"></i>
                    </a>
                </div>
            </div>
        </footer>

        <!-- Bootstrap -->
        <script src="./packages/bootstrap-5.3.8-dist/js/bootstrap.bundle.min.js"></script>
        <!-- JavaScript -->
        <script type="module" src="./js/main.js"></script>
    </body>
</html>
